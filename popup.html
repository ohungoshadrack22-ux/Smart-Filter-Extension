<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #f1f5f9;
      margin: 0;
    }
    h2 {
      margin: 0 0 4px;
      font-size: 15px;
      color: #38bdf8;
      font-weight: 600;
    }
    p {
      margin: 0 0 14px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.5;
    }
    .tip {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .tip b { color: #38bdf8; }
  </style>
</head>
<body>
  <h2>⚡ SmartFilter</h2>
  <p>Auto refresh &amp; row filter for any page.</p>
  <div class="tip">
    The <b>panel</b> appears on supported pages automatically.<br><br>
    Drag it anywhere on screen.<br><br>
    Settings are saved <b>per site</b> — no reconfiguring after refresh.
  </div>
</body>
</html>
